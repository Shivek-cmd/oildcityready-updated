<!-- ============================================================
     GLOBAL HEADER — Oil City Ready Mix Ltd.
     Self-contained: HTML + CSS + JS
     ============================================================ -->

<style>
  /* ── Header shell ── */
  .site-header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: var(--z-sticky);
    height: var(--header-h);
    display: flex;
    align-items: center;
    background: var(--color-bg);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }

  .site-header__inner {
    width: 100%;
    max-width: var(--container-max);
    margin-inline: auto;
    padding-inline: var(--container-px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-8);
  }

  /* ── Logo ── */
  .site-logo {
    display: flex;
    align-items: center;
    text-decoration: none;
    flex-shrink: 0;
  }

  .site-logo__img {
    height: 62px;
    width: auto;
    display: block;
    object-fit: contain;
    transition: opacity var(--dur-fast) var(--ease-out);
  }

  .site-logo:hover .site-logo__img {
    opacity: 0.85;
  }

  /* ── Nav ── */
  .site-nav {
    display: flex;
    align-items: center;
    gap: var(--space-8);
  }

  .site-nav__link {
    font-size: var(--text-sm);
    font-weight: var(--weight-medium);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #0A0F1C;
    text-decoration: none;
    position: relative;
    transition: color var(--dur-fast) var(--ease-out);
    white-space: nowrap;
  }

  .site-nav__link::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 0;
    height: 1.5px;
    background: var(--color-primary);
    transition: width var(--dur-base) var(--ease-out);
  }

  .site-nav__link:hover,
  .site-nav__link.active {
    color: var(--color-primary);
    opacity: 1;
  }

  .site-nav__link:hover::after,
  .site-nav__link.active::after {
    width: 100%;
  }

  /* ── CTA button (header-specific: transparent outline on dark bg) ── */
  .site-header__cta {
    flex-shrink: 0;
  }

  .site-header__cta.btn-outline {
    background: var(--color-primary);
    color: #0A0F1C;
    border-color: var(--color-primary);
  }

  .site-header__cta.btn-outline:hover {
    background: var(--color-accent);
    border-color: var(--color-accent);
    color: #0A0F1C;
    box-shadow: 0 0 24px rgba(201,169,98,0.35);
  }

  /* ── Burger button (mobile) ── */
  .site-header__burger {
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 5px;
    width: 40px;
    height: 40px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    flex-shrink: 0;
  }

  .burger-line {
    display: block;
    width: 24px;
    height: 1.5px;
    background: #0A0F1C;
    border-radius: 2px;
    transition:
      transform var(--dur-base) var(--ease-out),
      opacity   var(--dur-base) var(--ease-out),
      width     var(--dur-base) var(--ease-out);
  }

  /* Burger open state */
  .site-header__burger.open .burger-line:nth-child(1) {
    transform: translateY(6.5px) rotate(45deg);
  }
  .site-header__burger.open .burger-line:nth-child(2) {
    opacity: 0;
    width: 0;
  }
  .site-header__burger.open .burger-line:nth-child(3) {
    transform: translateY(-6.5px) rotate(-45deg);
  }

  /* ── Mobile nav overlay ── */
  .site-mobile-nav {
    position: fixed;
    inset: 0;
    top: var(--header-h);
    background: rgba(8, 8, 8, 0.97);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: calc(var(--z-sticky) - 1);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: var(--space-8);
    opacity: 0;
    pointer-events: none;
    transform: translateY(-8px);
    transition:
      opacity    var(--dur-slow) var(--ease-out),
      transform  var(--dur-slow) var(--ease-out);
  }

  .site-mobile-nav.open {
    opacity: 1;
    pointer-events: all;
    transform: translateY(0);
  }

  .site-mobile-nav__link {
    font-family: var(--font-display);
    font-size: clamp(2rem, 8vw, 3.5rem);
    letter-spacing: 0.06em;
    color: rgba(255, 255, 255, 0.65);
    text-decoration: none;
    transition: color var(--dur-fast) var(--ease-out);
  }

  .site-mobile-nav__link:hover {
    color: var(--color-primary);
    opacity: 1;
  }

  .site-mobile-nav__cta {
    margin-top: var(--space-4);
  }

  /* Mobile nav CTA override — primary btn on dark overlay */
  .site-mobile-nav__cta.btn-primary {
    background: var(--color-primary);
    color: #0A0F1C;
    border-color: var(--color-primary);
  }

  .site-mobile-nav__cta.btn-primary:hover {
    background: var(--color-accent);
    border-color: var(--color-accent);
    color: #0A0F1C;
  }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .site-nav,
    .site-header__cta { display: none; }
    .site-header__burger { display: flex; }
  }

  @media (min-width: 901px) {
    .site-mobile-nav { display: none; }
  }
</style>

<!-- ── Header HTML ── -->
<header class="site-header" id="site-header" role="banner">
  <div class="site-header__inner">

    <!-- Logo -->
    <a href="/" class="site-logo" aria-label="Oil City Ready Mix Ltd. – Home">
      <img src="https://assets.cdn.filesafe.space/pDreylt0DE2IrmVNC9Mn/media/69de86f8acf21ea88ae0c448.png" alt="Oil City Ready Mix Ltd." class="site-logo__img" />
    </a>

    <!-- Desktop Nav -->
    <nav class="site-nav" aria-label="Main Navigation">
      <a href="/" class="site-nav__link">Home</a>
      <a href="#about"      class="site-nav__link">About</a>
      <a href="#services"   class="site-nav__link">Services &amp; Products</a>
      <a href="#corporate"  class="site-nav__link">Corporate</a>
      <a href="#calculator" class="site-nav__link">Calculator</a>
      <a href="#contact"    class="site-nav__link">Contact</a>
    </nav>

    <!-- Desktop CTA -->
    <a href="#quote" class="btn btn-outline site-header__cta">Request a Quote</a>

    <!-- Mobile Burger -->
    <button
      class="site-header__burger"
      id="burger-btn"
      aria-label="Open navigation menu"
      aria-expanded="false"
      aria-controls="mobile-nav"
    >
      <span class="burger-line" aria-hidden="true"></span>
      <span class="burger-line" aria-hidden="true"></span>
      <span class="burger-line" aria-hidden="true"></span>
    </button>

  </div>
</header>

<!-- ── Mobile Nav Overlay ── -->
<nav class="site-mobile-nav" id="mobile-nav" aria-label="Mobile Navigation" aria-hidden="true">
  <a href="/"  class="site-mobile-nav__link">Home</a>
  <a href="#about"          class="site-mobile-nav__link">About</a>
  <a href="#services"       class="site-mobile-nav__link">Services &amp; Products</a>
  <a href="#corporate"      class="site-mobile-nav__link">Corporate</a>
  <a href="#calculator"     class="site-mobile-nav__link">Calculator</a>
  <a href="#contact"        class="site-mobile-nav__link">Contact</a>
  <a href="#quote"          class="btn btn-primary btn-lg site-mobile-nav__cta">Request a Quote</a>
</nav>

<!-- ── Header JS ── -->
<script>
  (function () {
    var header    = document.getElementById('site-header');
    var burger    = document.getElementById('burger-btn');
    var mobileNav = document.getElementById('mobile-nav');
    var isOpen    = false;


    /* Burger toggle */
    function toggleMenu(open) {
      isOpen = open;
      burger.classList.toggle('open', isOpen);
      mobileNav.classList.toggle('open', isOpen);
      burger.setAttribute('aria-expanded', String(isOpen));
      mobileNav.setAttribute('aria-hidden', String(!isOpen));
      document.body.style.overflow = isOpen ? 'hidden' : '';
    }

    if (burger && mobileNav) {
      burger.addEventListener('click', function () {
        toggleMenu(!isOpen);
      });

      /* Close on link click */
      mobileNav.querySelectorAll('a').forEach(function (link) {
        link.addEventListener('click', function () { toggleMenu(false); });
      });

      /* Close on Escape */
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && isOpen) toggleMenu(false);
      });
    }

    /* Active link highlight based on scroll position */
    var sections = ['about', 'services', 'corporate', 'calculator', 'quote', 'contact'];
    var navLinks = document.querySelectorAll('.site-nav__link');

    window.addEventListener('scroll', function () {
      var current = '';
      sections.forEach(function (id) {
        var el = document.getElementById(id);
        if (el && window.scrollY >= el.offsetTop - 120) current = id;
      });

      navLinks.forEach(function (link) {
        var href = link.getAttribute('href');
        link.classList.toggle('active', href === '#' + current);
        if (current === '' && href.includes('index.html')) {
          link.classList.add('active');
        }
      });
    }, { passive: true });

  })();
</script>
